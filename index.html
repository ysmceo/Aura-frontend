<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Aura Salon offers professional hair, beauty, grooming, bookings, and product delivery services in Lagos."
    />
    <title>Aura Salon</title>
    <script>
      (() => {
        const storageKey = "aura-salon-theme";
        const legacyStorageKey = "ceo-salon-theme";
        const storedTheme =
          window.localStorage.getItem(storageKey) ??
          window.localStorage.getItem(legacyStorageKey);

        if (
          !window.localStorage.getItem(storageKey) &&
          (storedTheme === "light" || storedTheme === "dark")
        ) {
          window.localStorage.setItem(storageKey, storedTheme);
        }

        window.localStorage.removeItem(legacyStorageKey);
        const theme =
          storedTheme === "light" || storedTheme === "dark"
            ? storedTheme
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";

        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
